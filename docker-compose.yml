services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: trends-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_trends
      POSTGRES_USER: trends
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trends -d ai_trends"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: trends-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

volumes:
  pgdata:
